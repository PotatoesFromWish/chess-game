name: Build Executables

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pygame pillow

      - name: Build with PyInstaller
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            pyinstaller --onedir --windowed \
              --add-data "assets/sprites:assets/sprites" \
              --add-data "assets/sounds:assets/sounds" \
              main.py
          else
            pyinstaller --onefile --windowed \
              --add-data "assets/sprites;assets/sprites" \
              --add-data "assets/sounds;assets/sounds" \
              main.py
          fi

      - name: Package macOS app
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r chess-mac.zip main.app
          mv chess-mac.zip ../chess-mac.zip
          cd ..

      - name: Rename Windows executable
        if: matrix.os == 'windows-latest'
        shell: bash
        run: mv dist/main.exe dist/chess-windows.exe

      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: chess-macos-latest
          path: chess-mac.zip

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: chess-windows-latest
          path: dist/chess-windows.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Chess v${{ github.run_number }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}